<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Letter Generator UPSI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --upsi-purple:#672889;
  --upsi-purple-dark:#4a1d63;
  --upsi-purple-light:#8b3db3;
  --upsi-gold:#F9A825;
  --upsi-gold-dark:#e69500;
  --upsi-gold-light:#ffc947;
  --surface:#ffffff;
  --surface2:#f8f9fb;
  --border:#e4d9ed;
  --text:#1a0d24;
  --text2:#4a3d54;
  --text3:#8b7a99;
  --radius:10px;
  --shadow:0 1px 3px rgba(103,40,137,.08),0 4px 12px rgba(103,40,137,.06);
  --shadow-lg:0 8px 24px rgba(103,40,137,.12);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'DM Sans',sans-serif;
  background:linear-gradient(135deg, var(--upsi-purple) 0%, var(--upsi-purple-dark) 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:relative;
  overflow:hidden;
}

/* Decorative background elements */
.bg-decoration{
  position:absolute;
  border-radius:50%;
  opacity:0.1;
}

.bg-circle-1{
  width:500px;
  height:500px;
  background:var(--upsi-gold);
  top:-150px;
  right:-150px;
}

.bg-circle-2{
  width:300px;
  height:300px;
  background:var(--upsi-gold-light);
  bottom:-100px;
  left:-100px;
}

.bg-circle-3{
  width:200px;
  height:200px;
  background:var(--upsi-purple-light);
  top:50%;
  right:10%;
}

/* Login Container */
.login-container{
  width:100%;
  max-width:440px;
  position:relative;
  z-index:10;
}

/* Logo Section */
.logo-section{
  text-align:center;
  margin-bottom:40px;
}

.logo{
  width:80px;
  height:80px;
  background:linear-gradient(135deg, var(--upsi-gold), var(--upsi-gold-light));
  border-radius:20px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-bottom:20px;
  box-shadow:0 8px 32px rgba(249,168,37,.3);
}

.logo svg{
  width:40px;
  height:40px;
  color:var(--upsi-purple-dark);
}

.logo-text{
  color:#fff;
  font-size:28px;
  font-weight:700;
  margin-bottom:8px;
  letter-spacing:-0.5px;
}

.logo-subtitle{
  color:rgba(255,255,255,.75);
  font-size:15px;
  font-weight:500;
}

/* Login Card */
.login-card{
  background:var(--surface);
  border-radius:24px;
  padding:48px;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
}

.login-header{
  text-align:center;
  margin-bottom:36px;
}

.login-title{
  font-size:26px;
  font-weight:700;
  color:var(--text);
  margin-bottom:8px;
}

.login-subtitle{
  font-size:14px;
  color:var(--text3);
}

/* Form */
.login-form{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.form-group{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.form-label{
  font-size:14px;
  font-weight:600;
  color:var(--text2);
  padding-left:4px;
}

.form-input-wrapper{
  position:relative;
}

.form-icon{
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  width:20px;
  height:20px;
  color:var(--text3);
  pointer-events:none;
}

.form-input{
  width:100%;
  padding:14px 16px 14px 48px;
  border:2px solid var(--border);
  border-radius:12px;
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  color:var(--text);
  transition:all 0.2s ease;
  outline:none;
}

.form-input:focus{
  border-color:var(--upsi-purple);
  box-shadow:0 0 0 4px rgba(103,40,137,.1);
}

.form-input::placeholder{
  color:var(--text3);
}

/* Password Toggle */
.password-toggle{
  position:absolute;
  right:16px;
  top:50%;
  transform:translateY(-50%);
  width:20px;
  height:20px;
  color:var(--text3);
  cursor:pointer;
  transition:color 0.2s ease;
}

.password-toggle:hover{
  color:var(--upsi-purple);
}

/* Remember & Forgot */
.form-options{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:-8px;
}

.remember-me{
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
}

.checkbox{
  width:18px;
  height:18px;
  cursor:pointer;
  accent-color:var(--upsi-purple);
}

.remember-label{
  font-size:14px;
  color:var(--text2);
  cursor:pointer;
  user-select:none;
}

.forgot-link{
  font-size:14px;
  color:var(--upsi-purple);
  text-decoration:none;
  font-weight:600;
  transition:color 0.2s ease;
}

.forgot-link:hover{
  color:var(--upsi-purple-dark);
}

/* Buttons */
.btn-primary{
  width:100%;
  padding:15px;
  background:linear-gradient(135deg, var(--upsi-purple), var(--upsi-purple-light));
  color:#fff;
  border:none;
  border-radius:12px;
  font-family:'DM Sans',sans-serif;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.3s ease;
  margin-top:12px;
  box-shadow:0 4px 16px rgba(103,40,137,.3);
}

.btn-primary:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(103,40,137,.4);
}

.btn-primary:active{
  transform:translateY(0);
}

/* Divider */
.divider{
  display:flex;
  align-items:center;
  gap:16px;
  margin:28px 0;
}

.divider-line{
  flex:1;
  height:1px;
  background:var(--border);
}

.divider-text{
  font-size:13px;
  color:var(--text3);
  font-weight:500;
}

/* Social Login */
.social-login{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.btn-social{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:13px;
  background:var(--surface2);
  border:2px solid var(--border);
  border-radius:12px;
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  font-weight:600;
  color:var(--text2);
  cursor:pointer;
  transition:all 0.2s ease;
}

.btn-social:hover{
  border-color:var(--upsi-purple);
  background:#fff;
  transform:translateY(-2px);
  box-shadow:var(--shadow);
}

.btn-social svg{
  width:20px;
  height:20px;
}

/* Sign Up Link */
.signup-section{
  text-align:center;
  margin-top:28px;
  padding-top:28px;
  border-top:1px solid var(--border);
}

.signup-text{
  font-size:14px;
  color:var(--text3);
}

.signup-link{
  color:var(--upsi-purple);
  text-decoration:none;
  font-weight:600;
  margin-left:4px;
  transition:color 0.2s ease;
}

.signup-link:hover{
  color:var(--upsi-purple-dark);
}

/* Responsive */
@media (max-width: 500px){
  .login-card{
    padding:32px 24px;
  }
  
  .logo-text{
    font-size:24px;
  }
  
  .login-title{
    font-size:22px;
  }
  
  .social-login{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<!-- Background Decorations -->
<div class="bg-decoration bg-circle-1"></div>
<div class="bg-decoration bg-circle-2"></div>
<div class="bg-decoration bg-circle-3"></div>

<div class="login-container">
  <!-- Logo Section -->
  <div class="logo-section">
    <div class="logo">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
    </div>
    <div class="logo-text">Letter Generator</div>
    <div class="logo-subtitle">UPSI Document System</div>
  </div>

  <!-- Login Card -->
  <div class="login-card">
    <div class="login-header">
      <h1 class="login-title">Welcome Back</h1>
      <p class="login-subtitle">Sign in to access your documents</p>
    </div>

    <form class="login-form" onsubmit="handleLogin(event)">
      <!-- Email Input -->
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="form-input-wrapper">
          <svg class="form-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>
          </svg>
          <input type="email" id="email" class="form-input" placeholder="yourname@upsi.edu.my" required>
        </div>
      </div>

      <!-- Password Input -->
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="form-input-wrapper">
          <svg class="form-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
          <svg class="password-toggle" fill="none" stroke="currentColor" viewBox="0 0 24 24" onclick="togglePassword()">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
        </div>
      </div>

      <!-- Remember & Forgot -->
      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" class="checkbox" id="remember">
          <span class="remember-label">Remember me</span>
        </label>
        <a href="#" class="forgot-link">Forgot Password?</a>
      </div>

      <!-- Login Button -->
      <button type="submit" class="btn-primary">Sign In</button>
    </form>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">OR</span>
      <div class="divider-line"></div>
    </div>

    <!-- Social Login -->
    <div class="social-login">
      <button class="btn-social" onclick="alert('Google login coming soon!')">
        <svg viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google
      </button>
      <button class="btn-social" onclick="alert('Microsoft login coming soon!')">
        <svg viewBox="0 0 24 24">
          <path fill="#f35325" d="M1 1h10v10H1z"/>
          <path fill="#81bc06" d="M13 1h10v10H13z"/>
          <path fill="#05a6f0" d="M1 13h10v10H1z"/>
          <path fill="#ffba08" d="M13 13h10v10H13z"/>
        </svg>
        Microsoft
      </button>
    </div>

    <!-- Sign Up Section -->
    <div class="signup-section">
      <span class="signup-text">Don't have an account?</span>
      <a href="#" class="signup-link">Sign up now</a>
    </div>
  </div>
</div>

<script>
function togglePassword() {
  const passwordInput = document.getElementById('password');
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
  } else {
    passwordInput.type = 'password';
  }
}

function handleLogin(event) {
  event.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  
  // Simple validation demo - replace with actual authentication
  if (email && password) {
    // Store login state (in real app, use proper authentication)
    sessionStorage.setItem('isLoggedIn', 'true');
    sessionStorage.setItem('userEmail', email);
    
    // Redirect to main page
    window.location.href = 'index.html';
  }
}

// Check if already logged in
if (sessionStorage.getItem('isLoggedIn') === 'true') {
  window.location.href = 'index.html';
}
</script>

</body>
</html>
